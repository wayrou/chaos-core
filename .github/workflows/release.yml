name: publish

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

jobs:
  publish-tauri:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            args: --target aarch64-apple-darwin
          - platform: macos-latest
            args: --target x86_64-apple-darwin
          - platform: ubuntu-22.04
            args: ""
          - platform: windows-latest
            args: ""

    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v6

      - name: setup pnpm
        uses: pnpm/action-setup@v5
        with:
          version: 10.25.0

      - name: install linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: setup node
        uses: actions/setup-node@v6
        with:
          node-version: lts/*
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: install rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: "./src-tauri -> target"

      - name: install frontend dependencies
        run: pnpm install --frozen-lockfile

      - name: normalize updater signing key
        shell: bash
        env:
          RAW_TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
        run: |
          node <<'EOF'
          const fs = require('fs');
          const path = require('path');

          const raw = process.env.RAW_TAURI_SIGNING_PRIVATE_KEY || '';
          const envFile = process.env.GITHUB_ENV;
          const runnerTemp = process.env.RUNNER_TEMP;

          const candidates = raw.match(/[A-Za-z0-9+/=]{100,}/g) || [];
          let extracted = null;

          for (const candidate of candidates) {
            const decoded = Buffer.from(candidate, 'base64').toString('utf8');
            if (decoded.startsWith('untrusted comment:')) {
              extracted = candidate;
              break;
            }
          }

          if (!extracted) {
            console.error('Could not extract a valid Tauri signing key from TAURI_SIGNING_PRIVATE_KEY.');
            process.exit(1);
          }

          const keyPath = path.join(runnerTemp, 'tauri-signing.key');
          fs.writeFileSync(keyPath, extracted, 'utf8');
          fs.appendFileSync(envFile, `TAURI_SIGNING_PRIVATE_KEY_PATH=${keyPath}\n`);
          fs.appendFileSync(envFile, 'TAURI_SIGNING_PRIVATE_KEY_PASSWORD=\n');
          EOF

      - uses: tauri-apps/tauri-action@v0.6.2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY_PATH: ${{ env.TAURI_SIGNING_PRIVATE_KEY_PATH }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ env.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: v__VERSION__
          releaseName: Chaos Core v__VERSION__
          releaseBody: Signed Chaos Core desktop builds and updater metadata.
          releaseDraft: false
          prerelease: false
          args: ${{ matrix.args }}
